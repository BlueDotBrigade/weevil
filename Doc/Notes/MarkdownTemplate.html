<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8" />

    <title><!--TITLE--></title>

    <style>

        :root {
            color-scheme: light dark;
            --background-color: #FFFFFF;
            --foreground-color: #1E1E1E;
            --heading-color: #000000;
            --code-background-color: #F4F4F4;
            --table-border-color: #CCCCCC;
            --link-color: #0066CC;
            --blockquote-border-color: #CCCCCC;
            --blockquote-background-color: #FAFAFA;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background-color: #1E1E1E;
                --foreground-color: #DCDCDC;
                --heading-color: #FFFFFF;
                --code-background-color: #2D2D30;
                --table-border-color: #555555;
                --link-color: #4FC1FF;
                --blockquote-border-color: #555555;
                --blockquote-background-color: #252526;
            }
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Segoe UI, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            margin: 40px;
            max-width: 1200px;
            background-color: var(--background-color);
            color: var(--foreground-color);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--heading-color);
            margin-top: 32px;
        }

        h1 {
            border-bottom: 2px solid var(--table-border-color);
            padding-bottom: 8px;
        }

        h2 {
            border-bottom: 1px solid var(--table-border-color);
            padding-bottom: 4px;
        }

        code,
        pre {
            font-family: Consolas, monospace;
        }

        code {
            background-color: var(--code-background-color);
            padding: 2px 4px;
            border-radius: 4px;
        }

        pre {
            background-color: var(--code-background-color);
            padding: 16px;
            overflow-x: auto;
            border-radius: 6px;
        }

            pre code {
                padding: 0;
                background-color: transparent;
            }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid var(--table-border-color);
            padding: 8px 12px;
            text-align: left;
        }

        th {
            background-color: var(--code-background-color);
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

            a:hover {
                text-decoration: underline;
            }

        blockquote {
            border-left: 4px solid var(--blockquote-border-color);
            background-color: var(--blockquote-background-color);
            margin-left: 0;
            padding: 8px 16px;
        }

        img {
            max-width: 100%;
        }

        hr {
            border: none;
            border-top: 1px solid var(--table-border-color);
            margin-top: 32px;
            margin-bottom: 32px;
        }
    </style>

</head>
<body>

    <!--BODY-->

</body>
</html>
